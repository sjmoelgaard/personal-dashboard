services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard-api.rule=Host(`mylife.smoelgaard.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.dashboard-api.entrypoints=https"
      - "traefik.http.routers.dashboard-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.dashboard-api.loadbalancer.server.port=8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    networks:
      - default
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard-frontend.rule=Host(`mylife.smoelgaard.com`)"
      - "traefik.http.routers.dashboard-frontend.entrypoints=https"
      - "traefik.http.routers.dashboard-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.dashboard-frontend.loadbalancer.server.port=80"

  ntfy:
    image: binwiederhier/ntfy:v2.11.0
    restart: unless-stopped
    command: serve
    volumes:
      - ntfy_data:/var/lib/ntfy
    networks:
      - default
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard-ntfy.rule=Host(`ntfy.smoelgaard.com`)"
      - "traefik.http.routers.dashboard-ntfy.entrypoints=https"
      - "traefik.http.routers.dashboard-ntfy.tls.certresolver=letsencrypt"
      - "traefik.http.services.dashboard-ntfy.loadbalancer.server.port=80"

volumes:
  postgres_data:
  ntfy_data:

networks:
  coolify:
    external: true
